        font-size: 0.75rem;
        color: #4f4a33;
      }

        border: 1px solid #e3ddc2;
        background: #fffef7;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);

        width: 100%;
        border-collapse: collapse;

        min-width: 1300px;

        color: #3a3a2a;

        top: 0;
        z-index: 1; /* ★ 新增一行 */
        backdrop-filter: blur(2px);
        cursor: default;

        height: auto;

      }

        margin-top: 20px;

        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        background: #f3efdf;
        border-radius: 20px 20px 0 0;

        border-bottom: 1px solid #e0d6b6;

        color: #3b3a2e;
        font-size: 0.9rem;
        letter-spacing: -0.2px;

        border: none;
        font-size: 1.3rem;
        line-height: 1;
        cursor: pointer;
        color: #8b7f5a;
        transition: 0.1s;
        padding: 0 4px;

        word-break: break-word;

            <option value="def">防御力</option>
            <option value="mres">法术抗性</option>
            <option value="dph">DPH</option>
            <option value="dps">DPS</option>
            <option value="burnDps">燃命DPS</option>
            <option value="physResist">物理承受</option>
            <option value="magicResist">法术承受</option>
            <option value="dmgResist">损伤承受</option>
          </select>
          <select id="sortOrderSelect" class="filter-select">

            <option value="desc">降序 ↓</option>
          </select>
        </div>
      </div>

        function closePopupByIdentifier(identifier) {
          const popup = activePopups.get(identifier);
          if (popup && popup.parentNode) {
            popup.parentNode.removeChild(popup);
            activePopups.delete(identifier);
          }
        }
        function makeDraggable(popup, handleSelector) {
          let isDragging = false,
            startX,
            startY,
            initialLeft,
            initialTop;
          const handle = popup.querySelector(handleSelector);
          if (!handle) return;
          const onMouseMove = (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const dx = e.clientX - startX,
              dy = e.clientY - startY;
            let newLeft = initialLeft + dx,
              newTop = initialTop + dy;
            const maxX = window.innerWidth - popup.offsetWidth - 10;
            const maxY = window.innerHeight - popup.offsetHeight - 10;
            newLeft = Math.min(Math.max(10, newLeft), maxX);
            newTop = Math.min(Math.max(10, newTop), maxY);
            popup.style.left = newLeft + "px";
            popup.style.top = newTop + "px";
          };
          const onMouseUp = () => {
            if (isDragging) {
              isDragging = false;
              document.removeEventListener("mousemove", onMouseMove);
              document.removeEventListener("mouseup", onMouseUp);
              document.body.classList.remove("dragging");
            }
          };
          handle.addEventListener("mousedown", (e) => {
            if (e.button !== 0) return;
            e.preventDefault();
            const rect = popup.getBoundingClientRect();
            startX = e.clientX;
            startY = e.clientY;
            initialLeft = rect.left;
            initialTop = rect.top;
            isDragging = true;
            document.body.classList.add("dragging");
            document.addEventListener("mousemove", onMouseMove);
            document.addEventListener("mouseup", onMouseUp);
          });
        }
        function createPopup(
          abilityText,
          triggerButton,
          rowIdentifier,
          playerName,
        ) {
          if (activePopups.has(rowIdentifier)) {
            closePopupByIdentifier(rowIdentifier);
            return null;
          }
          const popup = document.createElement("div");
          popup.className = "custom-popup";
          const btnRect = triggerButton.getBoundingClientRect();
          let left = btnRect.right + 8,
            top = btnRect.top - 10;
          const popupWidth = 320,
            popupHeightHint = 180;
          if (left + popupWidth > window.innerWidth - 10)
            left = btnRect.left - popupWidth - 8;
          if (left < 10) left = 10;
          if (top + popupHeightHint > window.innerHeight - 20)
            top = window.innerHeight - popupHeightHint - 20;
          if (top < 10) top = 10;
          popup.style.left = left + "px";
          popup.style.top = top + "px";
          const header = document.createElement("div");
          header.className = "popup-header";
          const titleSpan = document.createElement("span");
          titleSpan.className = "popup-title";
          titleSpan.innerText = `📋️ ${playerName} · 天赋能力`;
          const closeBtn = document.createElement("button");
          closeBtn.className = "popup-close";
          closeBtn.innerHTML = "✕";
          header.appendChild(titleSpan);
          header.appendChild(closeBtn);
          const contentDiv = document.createElement("div");
          contentDiv.className = "popup-content";
          const contentText = document.createElement("p");
          const displayText =
            abilityText &&
            abilityText.trim() !== "" &&
            abilityText.trim() !== "无"
              ? abilityText
              : "无特殊天赋";
          contentText.innerHTML = displayText;
          contentDiv.appendChild(contentText);
          popup.appendChild(header);
          popup.appendChild(contentDiv);
          document.body.appendChild(popup);
          const closePopupHandler = () => {
            if (popup && popup.parentNode) {
              popup.parentNode.removeChild(popup);
              activePopups.delete(rowIdentifier);
            }
          };
          closeBtn.addEventListener("click", closePopupHandler);
          makeDraggable(popup, ".popup-header");
          activePopups.set(rowIdentifier, popup);
          return popup;
        }

        let versionPopup = null;
        function closeVersionPopup() {
          if (versionPopup && versionPopup.parentNode) {
            versionPopup.parentNode.removeChild(versionPopup);
            versionPopup = null;
          }
        }
        function createVersionPopup(triggerBtn) {
          closeVersionPopup();
          const popup = document.createElement("div");
          popup.className = "custom-popup";
          const btnRect = triggerBtn.getBoundingClientRect();
          let left = btnRect.right + 8;
          let top = btnRect.top - 10;
          const popupWidth = 300;
          if (left + popupWidth > window.innerWidth - 10)
            left = btnRect.left - popupWidth - 8;
          if (left < 10) left = 10;
          if (top + 160 > window.innerHeight - 20)
            top = window.innerHeight - 180;
          if (top < 10) top = 10;
          popup.style.left = left + "px";
          popup.style.top = top + "px";
          const header = document.createElement("div");
          header.className = "popup-header";
          const titleSpan = document.createElement("span");
          titleSpan.className = "popup-title";
          titleSpan.innerText = "📊 版本说明";
          const closeBtn = document.createElement("button");
          closeBtn.className = "popup-close";
          closeBtn.innerHTML = "✕";
          header.appendChild(titleSpan);
          header.appendChild(closeBtn);
          const contentDiv = document.createElement("div");
          contentDiv.className = "popup-content";
          const contentP = document.createElement("p");
          contentP.textContent =
            "本页第一次启动时需要联网\n后续启动时可以不联网\n令光标悬停在表头以查看描述\n（“天赋与能力”栏没有描述）\n点击“查看”按钮查看天赋与能力\n按住弹窗标题可拖动，多个不同弹窗可共存\n再次点击对应“查看”按钮就可以关闭弹窗\n或点击弹窗右上角的“✕”也行";
          contentDiv.appendChild(contentP);
          popup.appendChild(header);
          popup.appendChild(contentDiv);
          document.body.appendChild(popup);
          const closeHandler = () => {
            if (popup && popup.parentNode) {
              popup.parentNode.removeChild(popup);
              versionPopup = null;
            }
          };
          closeBtn.addEventListener("click", closeHandler);
          makeDraggable(popup, ".popup-header");
          versionPopup = popup;
          return popup;
        }

        function renderTableFromData(dataArray) {
          activePopups.forEach((popup) => {
            if (popup && popup.parentNode) popup.parentNode.removeChild(popup);
          });
          activePopups.clear();
          const tbody = document.getElementById("tableBody");
          tbody.innerHTML = "";
          dataArray.forEach((p) => {
            const tr = document.createElement("tr");
            tr.className = "data-row";
            const cells = [
              p.name,
              `<img src="${p.icon}" alt="${p.name} 图标">`,
              p.level,
              p.dmgType,
              p.hp,
              p.atk,
              p.def,
              p.mres,
              p.interval,
              p.range,
              p.speed,
              p.dph,
              p.dps,
              p.burnDps,
              p.physResist,
              p.magicResist,
              p.dmgResist,
              p.silence,
              p.stun,
              p.frozen,
              p.disarmedCombat,
              p.palsy,
              p.cost,
              p.ability,
            ];
            cells.forEach((content, idx) => {
              const td = document.createElement("td");
              if (idx === 1) {
                td.style.textAlign = "center";
                td.innerHTML = content;
              } else td.textContent = content;
              tr.appendChild(td);
            });
            tr.dataset.originalAbility = p.ability;
            tr.dataset.playerName = p.name;
            tbody.appendChild(tr);
          });
          replaceAbilityCellsWithButtons();
          updateResultCount(dataArray.length);
        }

        function replaceAbilityCellsWithButtons() {
          const rows = document.querySelectorAll("#tableBody .data-row");
          rows.forEach((row) => {
            const cells = row.querySelectorAll("td");
            if (cells.length === 0) return;
            const abilityCell = cells[cells.length - 1];
            const originalAbility = row.dataset.originalAbility || "";
            const playerName = row.dataset.playerName || "";
            abilityCell.innerHTML = "";
            const viewBtn = document.createElement("button");
            viewBtn.className = "ability-btn";
            viewBtn.innerText = "🔍查看";
            viewBtn.setAttribute("data-ability", originalAbility);
            viewBtn.setAttribute("data-player", playerName);
            abilityCell.appendChild(viewBtn);
            viewBtn.addEventListener("click", (e) => {
              e.stopPropagation();
              const ability = viewBtn.getAttribute("data-ability") || "";
              const pName = viewBtn.getAttribute("data-player") || "选手";
              const rowEl = viewBtn.closest(".data-row");
              if (!rowEl) return;
              const identifier = getRowIdentifier(rowEl);
              if (activePopups.has(identifier))
                closePopupByIdentifier(identifier);
              else createPopup(ability, viewBtn, identifier, pName);
            });
          });
        }

        function updateResultCount(count) {
          const keyword = document.getElementById("searchKeyword").value.trim();
          const prefix = keyword === "" ? "✨ 共" : "🔍 匹配";
          const suffix = "名参赛者";
          document.getElementById("resultCount").innerHTML =
            `${prefix} ${count} ${suffix}`;
          document.getElementById("noDataMsg").style.display =
            count === 0 ? "block" : "none";
        }

        function getFilteredAndSortedData() {
          const keyword = document
            .getElementById("searchKeyword")
            .value.trim()
            .toLowerCase();
          const dmgType = document.getElementById("dmgTypeFilter").value;
          const level = document.getElementById("levelFilter").value;
          const resistField = document.getElementById("resistTypeSelect").value;
          const resistVal = document.getElementById("resistValueSelect").value;

          let filtered = playersData.filter((p) => {
            if (dmgType !== "all" && p.dmgType !== dmgType) return false;
            if (level !== "all" && p.level !== level) return false;
            if (resistVal !== "all") {
              const playerResist = p[resistField];
              if (resistVal === "有" && playerResist !== "有") return false;
              if (resistVal === "无" && playerResist !== "无") return false;
            }
            if (keyword !== "") {
              const searchable = (
                p.name +
                " " +
                p.level +
                " " +
                p.dmgType +
                " " +
                p.hp +
                " " +
                p.atk +
                " " +
                p.def +
                " " +
                p.mres +
                " " +
                p.dph +
                " " +
                p.dps +
                " " +
                p.burnDps +
                " " +
                p.physResist +
                " " +
                p.magicResist +
                " " +
                p.dmgResist +
                " " +
                p.silence +
                " " +
                p.stun +
                " " +
                p.frozen +
                " " +
                p.disarmedCombat +
                " " +
                p.palsy +
                " " +
                p.cost +
                " " +
                p.ability
              ).toLowerCase();
              if (!searchable.includes(keyword)) return false;
            }
            return true;
          });

          const sortBy = document.getElementById("sortBySelect").value;
          const sortOrder = document.getElementById("sortOrderSelect").value;
          filtered.sort((a, b) => {
            let valA, valB;
            if (sortBy === "level") {
              valA = levelOrder[a.level] || 99;
              valB = levelOrder[b.level] || 99;
            } else {
              valA = a[sortBy];
              valB = b[sortBy];
              if (typeof valA === "string" && !isNaN(parseFloat(valA)))
                valA = parseFloat(valA);
              if (typeof valB === "string" && !isNaN(parseFloat(valB)))
                valB = parseFloat(valB);
            }
            if (sortOrder === "asc") return valA > valB ? 1 : -1;
            else return valA < valB ? 1 : -1;
          });
          return filtered;
        }

        function applyFiltersAndSort() {
          const filtered = getFilteredAndSortedData();
          renderTableFromData(filtered);
        }

        function resetAllFilters() {
          document.getElementById("searchKeyword").value = "";
          document.getElementById("dmgTypeFilter").value = "all";
          document.getElementById("levelFilter").value = "all";
          document.getElementById("resistTypeSelect").value = "silence";
          document.getElementById("resistValueSelect").value = "all";
          document.getElementById("sortBySelect").value = "level";
          document.getElementById("sortOrderSelect").value = "asc";
          applyFiltersAndSort();
        }

        const tooltipEl = document.getElementById("headerTooltip");
        let tooltipTimer = null;
        let currentHoverTh = null;

        const TOOLTIP_TEXTS = [
          "这里显示选手被称为什么",
          "这里显示选手大致长什么样",
          "物以类聚，人以群分",
          "这里显示选手能造成哪种伤害",
          "该值降至0时，若该选手没有任何复活手段，该选手将视为被击倒",
          "该值越高代表着选手对敌方的直接威胁更高",
          "该值越高代表着敌方单位更容易抵挡物理伤害",
          "该值越高代表着敌方单位更容易抵挡法术伤害。",
          "该值越低代表着敌方单位其每次攻击之间的间隔更小，也即单位时间内的攻击次数更多\n单位为“秒”",
          "对于任何能作出攻击行为的选手，他们都会攻击进入其攻击范围的前n个单位（其中n=攻击目标数）；特别地，能够进行近战的选手通常会优先攻击自己正阻挡着的敌人",
          "通常，该值越高代表着敌方单位能以更快的速度到达目标地点",
          "该值越高代表着选手每一次攻击越沉重",
          "该值越高代表着选手的攻击越迅速",
          "该值越高代表着选手在“源石兴奋”状态下的攻击越迅速\n“源石兴奋”：受影响的选手攻击力+100%，攻击速度+50，但每秒获得一层“内伤”，持有“内伤”的选手每秒会受到 内伤层数×0.5%最大生命值 的真实伤害",
          "综合评估条目，该值越高代表着选手能接下越多物理伤害，运算规则通常为：\n最大生命值÷(1000-防御力)",
          "综合评估条目，该值越高代表着选手能接下越多法术伤害，运算规则通常为：\n最大生命值÷[1000×(1-法术抗性×0.01)]",
          "综合评估条目，该值越高代表着选手越接下越多元素损伤，运算规则为：\n(最大生命值÷6000)×10",
          "持有异常抗性时，该异常抗性对应的异常效果无法生效，无法被检测（但通常不会清除此异常效果）",
          "持有异常抗性时，该异常抗性对应的异常效果无法生效，无法被检测（但通常不会清除此异常效果）",
          "持有异常抗性时，该异常抗性对应的异常效果无法生效，无法被检测（但通常不会清除此异常效果）",
          "持有异常抗性时，该异常抗性对应的异常效果无法生效，无法被检测（但通常不会清除此异常效果）",
          "持有异常抗性时，该异常抗性对应的异常效果无法生效，无法被检测（但通常不会清除此异常效果）",
          "每局费用平均分成兵种+1份，每兵种分得一份，剩下的一份随机分配给每个兵种得到兵种出击费用\n每个兵种出第一个兵会消耗基础费用，出第二个会消耗基础费用+附加费用，第三个会消耗基础费用+附加费用*2，以此类推\n特别地，如果某一兵种的剩余费用不够继续发兵，则会根据兵种剩余费用和出下一个费用的比例为概率得到随机出击概率",
        ];

        function hideTooltip() {
          tooltipEl.classList.remove("visible");
          if (tooltipTimer) {
            clearTimeout(tooltipTimer);
            tooltipTimer = null;
          }
          currentHoverTh = null;
        }

        function showTooltipForTh(th) {
          const ths = document.querySelectorAll("#dataTable thead th");
          const index = Array.prototype.indexOf.call(ths, th);
          if (index < 0 || index >= TOOLTIP_TEXTS.length) {
            hideTooltip();
            return;
          }
          const text = TOOLTIP_TEXTS[index];
          if (!text) {
            hideTooltip();
            return;
          }
          if (tooltipTimer) {
            clearTimeout(tooltipTimer);
            tooltipTimer = null;
          }
          tooltipEl.textContent = text;
          const rect = th.getBoundingClientRect();
          let left = rect.left + window.scrollX;
          let top = rect.bottom + window.scrollY + 6;
          const tooltipWidth = tooltipEl.offsetWidth || 200;
          const tooltipHeight = tooltipEl.offsetHeight || 60;
          const viewportWidth = window.innerWidth;
          const viewportHeight = window.innerHeight;
          if (left + tooltipWidth > viewportWidth - 10) {
            left = viewportWidth - tooltipWidth - 10;
          }
          if (left < 10) left = 10;
          if (top + tooltipHeight > viewportHeight - 10) {
            top = rect.top + window.scrollY - tooltipHeight - 6;
            if (top < 10) top = 10;
          }
          tooltipEl.style.left = left + "px";
          tooltipEl.style.top = top + "px";
          tooltipEl.classList.add("visible");
          currentHoverTh = th;
          tooltipTimer = setTimeout(() => {
            hideTooltip();
          }, 60000);
        }

        function handleThMouseEnter(e) {
          const th = e.target.closest("th");
          if (!th) return;
          const ths = document.querySelectorAll("#dataTable thead th");
          const index = Array.prototype.indexOf.call(ths, th);
          if (index === ths.length - 1) {
            hideTooltip();
            return;
          }
          if (currentHoverTh === th) return;
          hideTooltip();
          showTooltipForTh(th);
        }

        function handleThMouseLeave(e) {
          const th = e.target.closest("th");
          if (!th) return;
          hideTooltip();
        }

        function handleGlobalChange() {
          if (tooltipEl.classList.contains("visible")) {
            hideTooltip();
          }
        }

        function initHeaderTooltips() {
          const thead = document.querySelector("#dataTable thead");
          if (!thead) return;
          thead.addEventListener("mouseenter", handleThMouseEnter, true);
          thead.addEventListener("mouseleave", handleThMouseLeave, true);
          window.addEventListener("scroll", handleGlobalChange, true);
          window.addEventListener("resize", handleGlobalChange);
        }

        let debounceTimer = null;
        function bindEvents() {
          const searchInput = document.getElementById("searchKeyword");
          const clearBtn = document.getElementById("clearSearchBtn");
          const filterInputs = [
            "dmgTypeFilter",
            "levelFilter",
            "resistTypeSelect",
            "resistValueSelect",
            "sortBySelect",
            "sortOrderSelect",
          ];
          searchInput.addEventListener("input", () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(applyFiltersAndSort, 20);
          });
          filterInputs.forEach((id) => {
            document
              .getElementById(id)
              .addEventListener("change", applyFiltersAndSort);
          });
          clearBtn.addEventListener("click", resetAllFilters);
        }

        function bindVersionButton() {
          const versionBtn = document.getElementById("versionInfoBtn");
          if (versionBtn) {
            versionBtn.addEventListener("click", (e) => {
              e.stopPropagation();
              if (versionPopup) {
                closeVersionPopup();
              } else {
                createVersionPopup(versionBtn);
              }
            });
          }
        }

        function init() {
          renderTableFromData(playersData);
          bindEvents();
          bindVersionButton();
          initHeaderTooltips();
        }
        init();
      })();
    </script>
  </body>
</html>
